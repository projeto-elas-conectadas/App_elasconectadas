version: '3.8'
services:
  db:
    image: mysql:8.0
    cap_add:
      - SYS_NICE
    command: --default-authentication-plugin=mysql_native_password
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  backend:
    image: node:20
    working_dir: /app
    restart: always
    volumes:
      - ./Elas_Conectadas_BackEnd:/app
    ports:
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      - db
    command: sh -c "yarn install && npx prisma generate && yarn build && yarn start:prod"

volumes:
  db_data: