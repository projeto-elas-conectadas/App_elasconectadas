paths:
  /posts/create:
    post:
      operationId: PostsController_createPost
      tags:
        - Posts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePostDto'
      responses:
        '201':
          description: Post criado

  /posts/list:
    get:
      operationId: PostsController_getPosts
      tags:
        - Posts
      responses:
        '200':
          description: Lista de posts

  /posts/{id}:
    get:
      operationId: PostsController_getPostById
      tags:
        - Posts
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      responses:
        '200':
          description: Post retornado
    patch:
      operationId: PostsController_updatePostById
      tags:
        - Posts
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePostDto'
      responses:
        '200':
          description: Post atualizado
    delete:
      operationId: PostsController_deletePostById
      tags:
        - Posts
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      responses:
        '200':
          description: Post apagado

components:
  schemas:
    CreatePostDto:
      type: object
      properties: {} # TODO: Ex: titulo, conteudo, autorId
      
    UpdatePostDto:
      type: object
      properties: {}