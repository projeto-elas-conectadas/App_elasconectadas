paths:
  /posts/create:
    post:
      operationId: PostsController_createPost
      tags:
        - Posts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePostDto'
      responses:
        '201':
          description: Post criado

  /posts/list:
    get:
      operationId: PostsController_getPosts
      tags:
        - Posts
      responses:
        '200':
          description: Lista de posts

  /posts/{id}:
    get:
      operationId: PostsController_getPostById
      tags:
        - Posts
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      responses:
        '200':
          description: Post retornado
    patch:
      operationId: PostsController_updatePostById
      tags:
        - Posts
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePostDto'
      responses:
        '200':
          description: Post atualizado
    delete:
      operationId: PostsController_deletePostById
      tags:
        - Posts
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      responses:
        '200':
          description: Post apagado

components:
  schemas:
    CreatePostDto:
      type: object
      required:
        - title
        - content
        - type
      properties:
        title:
          type: string
          example: "Workshop: Finanças para Empreendedoras"
        content:
          type: string
          example: "Aprenda a gerir o fluxo de caixa do seu negócio em 3 passos..."
        type:
          type: string
          example: "COURSE"
          description: "Valores aceitos: EVENT ou COURSE"
        cover:
          type: string
          format: uri
          example: "https://res.cloudinary.com/demo/image/upload/v1/posts/capa-curso.jpg"
          description: "Link da imagem da capa no Cloudinary"

    UpdatePostDto:
      type: object
      properties:
        title:
          type: string
        content:
          type: string
        type:
          type: string
        cover:
          type: string
          format: uri