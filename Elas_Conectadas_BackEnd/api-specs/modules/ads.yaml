paths:
  /ads/create:
    post:
      operationId: AdsController_createAd
      tags:
        - Ads
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAdDto'
      responses:
        '201':
          description: Anúncio criado

  /ads/list:
    get:
      operationId: AdsController_getAllAds
      tags:
        - Ads
      responses:
        '200':
          description: Lista de anúncios

  /ads/{id}:
    get:
      operationId: AdsController_getAdById
      tags:
        - Ads
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      responses:
        '200':
          description: Detalhes do anúncio
    patch:
      operationId: AdsController_patchAd
      tags:
        - Ads
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAdDto'
      responses:
        '200':
          description: Anúncio atualizado
    delete:
      operationId: AdsController_deleteAdById
      tags:
        - Ads
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      responses:
        '200':
          description: Anúncio removido

components:
  schemas:
    CreateAdDto:
      type: object
      required:
        - title
        - content
        - type
      properties:
        title:
          type: string
          example: "Desconto de 20% no Dia das Mães"
        content:
          type: string
          example: "Aproveite nossa promoção especial para todos os serviços agendados nesta semana!"
        type:
          type: string
          example: "PRODUCT"
          description: "Valores aceitos: PRODUCT, SERVICE ou COLLAB"
        cover:
          type: string
          format: uri
          example: "https://res.cloudinary.com/demo/image/upload/v1/ads/capa-promo.jpg"
          description: "Link da imagem da capa no Cloudinary"

    UpdateAdDto:
      type: object
      properties:
        title:
          type: string
        content:
          type: string
        type:
          type: string
        cover:
          type: string
          format: uri