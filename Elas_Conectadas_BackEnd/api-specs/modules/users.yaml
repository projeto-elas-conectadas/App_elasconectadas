paths:
  /users/register:
    post:
      operationId: UsersController_createUser
      tags:
        - Users
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserDto'
      responses:
        '201':
          description: Usuária registrada com sucesso

  /users/admin:
    post:
      operationId: UsersController_createAdmin
      tags:
        - Users
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAdminDto'
      responses:
        '201':
          description: Admin registrado com sucesso

  /users:
    get:
      operationId: UsersController_getUsers
      tags:
        - Users
      responses:
        '200':
          description: Lista de usuárias retornada

  /users/{id}:
    get:
      operationId: UsersController_getUserById
      tags:
        - Users
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      responses:
        '200':
          description: Dados da usuária
    patch:
      operationId: UsersController_updateUserById
      tags:
        - Users
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserDto'
      responses:
        '200':
          description: Usuária atualizada
    delete:
      operationId: UsersController_deleteUserById
      tags:
        - Users
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      responses:
        '200':
          description: Usuária removida

components:
  schemas:
    CreateUserDto:
      type: object
      required:
        - email
        - password
        - name
        - phone
        - dob
      properties:
        email:
          type: string
          format: email
          example: "empreendedora@teste.com"
        password:
          type: string
          format: password
          example: "SenhaSegura123!"
        name:
          type: string
          example: "Maria da Silva"
        phone:
          type: string
          example: "(43) 99999-8888"
        dob:
          type: string
          example: "15/05/1995"
          description: "Formato DD/MM/AAAA"

    CreateAdminDto:
      type: object
      required:
        - email
        - password
        - name
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
        name:
          type: string

    UpdateUserDto:
      type: object
      properties:
        name:
          type: string
          example: "Maria Silva Santos"
        phone:
          type: string
          example: "(43) 99999-0000"
        occupation:
          type: string
          example: "Artesã"
        bio:
          type: string
          example: "Trabalho com bordados personalizados há 10 anos."
        pfp:
          type: string
          format: uri
          description: "URL da foto no Cloudinary"
        rua:
          type: string
          example: "Rua Principal"
        numero:
          type: string
          example: "500"
        bairro:
          type: string
          example: "Centro"
        cidade:
          type: string
          example: "Itambaracá"
        estado:
          type: string
          example: "PR"